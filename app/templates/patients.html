{% extends "base.html" %}

{% block content %}

<h1>Patient Directory</h1>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Actions</th>
</tr>

{% for patient in patients %}

<tr>
<td>{{ patient.first_name }} {{ patient.last_name }}</td>
<td>{{ patient.email }}</td>

<td>

<a href="{{ url_for('prescribe', patient_id=patient.id) }}">
    Create Prescription
</a>

</td>
</tr>
{% endfor %}
</table>

{% endblock %}
