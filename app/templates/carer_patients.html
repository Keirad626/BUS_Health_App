<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes for Patients</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Patients</h1>

<ul>
    {% for patient in patients %}
    <li>
        {{ patient.full_name }}
        <a href="{{ url_for('carer_view_patient_notes', patient_id=patient.id) }}">
            View Patient Notes
        </a>
    </li>
    {% endfor %}
</ul>

<p><a href="{{ url_for('carer_dashboard') }}">Back to Dashboard</a></p>

</body>
</html>
