{% extends "base.html" %}

{% block content %}
<h2>Notes for {{patient.full_name}}</h2>

<ul>
    {% for note in notes %}
        <li>
            <strong>{{note.created_at.strftime("%Y-%m-d %H:%M") }}</strong>
            {{note.content}}
        </li>

    {% else %}
        <p>Not notes available for this patient.</p>
    {% endfor %}
</ul>

<a href="{{url_for('doctor_dashboard')}}">Back to Dashboard</a>
{% endblock %}
